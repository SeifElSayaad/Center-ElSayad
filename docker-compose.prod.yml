# Production Docker Compose
# Usage: docker-compose -f docker-compose.prod.yml up -d
#
# ⚠️  Before running:
#   1. Copy .env.example to .env and fill in all values
#   2. Copy backend/.env.example to backend/.env and fill in all values
#   3. Make sure CLOUDINARY_* vars are set if you use image uploads

services:
  # PostgreSQL Database
  database:
    image: postgres:15-alpine
    container_name: elsayad-db-prod
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data_prod:/var/lib/postgresql/data
    networks:
      - elsayad-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Backend API — uses multi-stage production build
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.prod
    container_name: elsayad-backend-prod
    restart: unless-stopped
    ports:
      - "3000:3000"
    env_file:
      - ./backend/.env
    environment:
      NODE_ENV: production
      DATABASE_URL: ${DOCKER_DATABASE_URL}
    depends_on:
      database:
        condition: service_healthy
    networks:
      - elsayad-network

  # Admin Panel — served by Nginx
  admin-panel:
    build:
      context: ./admin-panel
      dockerfile: Dockerfile.prod
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost:3000}
    container_name: elsayad-admin-prod
    restart: unless-stopped
    ports:
      - "8080:80"
    depends_on:
      - backend
    networks:
      - elsayad-network

volumes:
  postgres_data_prod:
    driver: local

networks:
  elsayad-network:
    driver: bridge

