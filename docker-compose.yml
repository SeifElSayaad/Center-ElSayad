
services:
  # PostgreSQL Database
  database:
    image: postgres:15-alpine
    container_name: elsayad-db
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - elsayad-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U elsayad -d ecommerce"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Backend API (Node.js + TypeScript)
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: elsayad-backend
    ports:
      - "3000:3000"
    env_file:
      - ./backend/.env
    environment:
      NODE_ENV: development
      DATABASE_URL: ${DOCKER_DATABASE_URL}
    depends_on:
      database:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - /app/node_modules
    networks:
      - elsayad-network
    command: sh -c "npx prisma generate && npm run dev"

  # Prisma Studio - Visual database browser
  prisma-studio:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: elsayad-prisma-studio
    ports:
      - "5555:5555"
    environment:
      DATABASE_URL: ${DOCKER_DATABASE_URL}
    depends_on:
      database:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - /app/node_modules
    networks:
      - elsayad-network
    command: sh -c "npx prisma generate && HOST=0.0.0.0 npx prisma studio --port 5555 --browser none"

  # Frontend App (Expo React Native)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: elsayad-frontend
    ports:
      - "8081:8081"
      - "19000:19000"
      - "19001:19001"
      - "19002:19002"
    environment:
      - NODE_ENV=development
      # For Expo to work correctly inside Docker, it needs to bind to 0.0.0.0
      - EXPO_DEVTOOLS_LISTEN_ADDRESS=0.0.0.0
      - REACT_NATIVE_PACKAGER_HOSTNAME=localhost # Change this to your machine's local IP (e.g., 192.168.1.x) to test on a physical device over Wi-Fi
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules
    networks:
      - elsayad-network
    command: npm start

  # Admin Panel (Vite + React)
  admin-panel:
    build:
      context: ./admin-panel
      dockerfile: Dockerfile
    container_name: elsayad-admin-panel
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=http://localhost:3000
    depends_on:
      - backend
    volumes:
      - ./admin-panel:/app
      - /app/node_modules
    networks:
      - elsayad-network
    command: npm run dev -- --host 0.0.0.0

# Volumes for persistent data
volumes:
  postgres_data:
    driver: local

# Network for services to communicate
networks:
  elsayad-network:
    driver: bridge
